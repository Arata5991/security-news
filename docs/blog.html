<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>セキュリティブログ収集ダッシュボード</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <h1>📝 セキュリティブログ収集</h1>
      <div class="header-actions">
        <button id="refresh-btn" class="refresh-btn">更新</button>
        <button id="logout-btn" class="logout-btn" style="display: none;">ログアウト</button>
      </div>
    </div>
    <div class="header-meta">
      <span id="last-updated">最終更新: 取得中...</span>
      <a class="page-nav-link" href="index.html">🛡️ セキュリティニュース一覧へ →</a>
    </div>
    <nav id="country-tabs" class="country-tabs">
      <button class="tab active" data-country="ALL">すべて</button>
      <button class="tab" data-country="JP">🇯🇵 日本</button>
      <button class="tab" data-country="US">🇺🇸 米国</button>
    </nav>
    <nav id="category-tabs" class="country-tabs category-tabs">
      <button class="tab active" data-category="ALL">すべてのカテゴリ</button>
      <button class="tab" data-category="VULN">🛠️ 脆弱性</button>
      <button class="tab" data-category="RANSOMWARE">💀 ランサムウェア</button>
      <button class="tab" data-category="INCIDENT">🚨 侵害・被害</button>
      <button class="tab" data-category="MALWARE">🦠 マルウェア/攻撃</button>
      <button class="tab" data-category="PHISHING">🎣 フィッシング</button>
      <button class="tab" data-category="POLICY">📜 政策・規制</button>
      <button class="tab" data-category="OTHER">📰 その他</button>
    </nav>
    <div class="filter-bar">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="🔍 キーワードで検索(タイトル・サマリ・情報源)"
      />
      <div class="date-filter">
        <label>期間</label>
        <input type="date" id="date-from" />
        <span>〜</span>
        <input type="date" id="date-to" />
      </div>
      <button id="clear-filters-btn" class="clear-btn">クリア</button>
    </div>
  </header>

  <main id="news-grid" class="news-grid">
    <p class="loading">ブログ記事を読み込み中...</p>
  </main>

  <div id="detail-modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">×</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    window.STATIC_MODE = true;
    window.DATA_URL = 'data/blogs.json';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabaseConfig.js"></script>
  <script src="authGuard.js"></script>
</body>
</html>
