name: Update security news data

on:
  schedule:
    # GitHubのschedule実行は間引かれることがあるため、実質2〜3時間ごとの更新を
    # 確保する目的で毎時実行にしている(正時ちょうどは混雑しやすいので17分にずらす)
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: node scripts/buildStaticData.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "chore: update security news data"
          # 他の実行と重なってpushが拒否された場合に備え、rebaseしてリトライする
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push失敗、pull --rebaseしてリトライします ($i)"
            git pull --rebase
          done
          exit 1
